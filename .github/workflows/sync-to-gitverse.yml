name: Sync to GitVerse

on:
   push:
      branches:
         - main

jobs:
   sync:
      runs-on: ubuntu-latest
      steps:
         - name: Checkout code
           uses: actions/checkout@v4
           with:
              fetch-depth: 0

         - name: Push to GitVerse
           env:
              GITVERSE_TOKEN: ${{ secrets.GITVERSE_TOKEN }}
           run: |
              GITVERSE_REPO="https://oauth2:${GITVERSE_TOKEN}@gitverse.ru/vadzhazha/Career-Intelligence-Platform.git"

              git remote add gitverse "$GITVERSE_REPO"
              git push -f gitverse main
